name: Generate Master EPG

on:
  schedule:
    # Automatyczne uruchomienie codziennie o 4:00 rano (czasu UTC)
    - cron: '0 4 * * *'
  workflow_dispatch: # Pozwala ręcznie odpalić skrypt z panelu GitHuba

jobs:
  build_epg:
    runs-on: ubuntu-latest
    
    # Niezbędne uprawnienia do wypchnięcia (pushowania) gotowego pliku z powrotem do repo
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install requests

    # Magia cache'owania bazy SQLite. Pozwala to na zachowanie 14-dniowego CatchUp bez obciążania repo.
    - name: Cache EPG SQLite Database
      uses: actions/cache@v4
      with:
        path: epg_cache.db
        key: epg-db-${{ github.run_id }}
        restore-keys: |
          epg-db-

    - name: Run EPG Master (Headless Mode)
      run: python epg_master.py --cli

    - name: Commit and Push generated EPG
      run: |
        git config --global user.name "EPG-Master-Bot"
        git config --global user.email "bot@epgmaster.local"
        git add master_epg.xml.gz
        # Wykonuje commit tylko, jeśli zaszły jakieś zmiany w pliku
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Master EPG [skip ci]"
        git push