name: Generate Master EPG

on:
  schedule:
    # Automatyczne uruchomienie codziennie o 1:05 rano (czasu UTC)
    - cron: '5 1 * * *'
  workflow_dispatch: # Pozwala ręcznie odpalić skrypt z panelu GitHuba

permissions:
  contents: write

jobs:
  build_epg:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install requests

    # Magia cache'owania bazy SQLite. Pozwala to na zachowanie 14-dniowego CatchUp bez obciążania repo.
    - name: Cache EPG SQLite Database
      uses: actions/cache@v4
      with:
        path: epg_cache.db
        key: epg-db-${{ github.run_id }}
        restore-keys: |
          epg-db-

    - name: Run EPG Master (Headless Mode)
      run: python epg_master.py --cli

    - name: Commit and push EPG
      run: |
        git config --global user.name "darthvader1971rn-collab"
        git config --global user.email "darthvader1971.rn@gmail.com"
        
        # Zmienione na dodawanie folderu Output
        git add Output/
        
        git commit -m "Auto-update Master EPG" || echo "Brak zmian do zatwierdzenia"
        
        # Nasz wczorajszy bezpiecznik chroniący przed błędem rejected
        git pull --rebase origin main
        
        git push
